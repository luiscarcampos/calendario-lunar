<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Lora:ital,wght=0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --accent: #c2e870; 
  --text: #ffffff;
  --text-dark: #000000;
  --muted: #a3b39d;
  --border: #2a3b24;
  --radius: 16px;
  
  /* Fondos Sólidos de Alto Contraste */
  --bg-dark: #0b120a;
  --panel-bg: #182415;
  --cell-bg: #111a0e;
  --cell-hover: #1e2d1a;
  
  --cat-1: #95d943;
  --cat-2: #f0ad5d;
  --cat-3: #5bc5eb;
  --cat-4: #f257a0;
}

*{box-sizing:border-box;margin:0;padding:0;}
body {
  font-family: 'Inter', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  background-color: var(--bg-dark);
  transition: background-image 0.5s ease-in-out;
}
.bg-overlay {
  position: fixed;
  inset: 0;
  /* Fondo súper oscuro para anular el brillo de las fotos */
  background: rgba(11, 18, 10, 0.88);
  z-index: -1;
}

.solid-panel {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}

.header { display: flex; justify-content: space-between; align-items: flex-end; padding: 24px 16px 16px; }
.month-name{ font-family:'Lora',serif; font-size:36px; font-weight:600; line-height: 1;}
.year-label{ font-family:'DM Mono',monospace; font-size:14px; font-weight:600; color:var(--accent); margin-left: 8px;}

.nav-group{display:flex;align-items:center;gap:6px;}
.nav-btn{ background: var(--cell-bg); border:1px solid var(--border); border-radius:8px; padding:10px; cursor:pointer; color:var(--text); transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.nav-btn:hover{background: var(--cell-hover); border-color: var(--accent);}
.today-btn{ font-size:12px; font-weight:600; font-family:'DM Mono',monospace; color:var(--accent); padding: 10px 14px;}

.weather-widget { margin: 0 14px 16px; padding: 16px; position: relative; z-index: 10; }
.weather-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight:600; font-family: 'DM Mono', monospace; color: var(--accent); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
.weather-loading { font-size: 13px; color: var(--muted); text-align: center; }
.weather-days { display: flex; justify-content: space-between; gap: 10px; }
.wf-day { flex: 1; display: flex; flex-direction: column; align-items: center; background: var(--cell-bg); padding: 10px 4px; border-radius: 10px; border: 1px solid var(--border); }
.wf-date { font-size: 11px; font-weight:600; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
.wf-icon { margin-bottom: 6px; font-size: 20px; color: var(--text); }
.wf-temp { font-size: 15px; font-weight: 700; margin-bottom: 2px;}
.wf-rain { font-size: 11px; font-weight:600; color: var(--cat-3); display: flex; align-items: center; gap: 4px; }

.act-filter-wrap{ padding:0 16px 16px; }
.act-chip{ display:flex;align-items:center;gap:6px; font-size:13px; font-weight: 600; padding:10px 16px; border-radius:12px; border:1px solid var(--border); background: var(--cell-bg); cursor:pointer; color:var(--text); white-space:nowrap; transition:all 0.1s; }
.act-chip.checked{ background: var(--accent); border-color: var(--accent); color: var(--text-dark); }
.act-chip.checked i { color: var(--text-dark) !important; }
.act-chip i { font-size: 18px; }

.icon-cat-1 { color: var(--cat-1); }
.icon-cat-2 { color: var(--cat-2); }
.icon-cat-3 { color: var(--cat-3); }
.icon-cat-4 { color: var(--cat-4); }

.weekdays{ display:grid; grid-template-columns:repeat(7,1fr); padding:0 12px 8px; }
.wd{ text-align:center; font-size:12px; color:var(--accent); font-family:'DM Mono',monospace; font-weight:600;}

.cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); padding:0 12px 12px; gap:6px; }
.day-cell{ position: relative; overflow: hidden; border-radius: 12px; min-height:85px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content: space-between; padding: 8px 4px; background: var(--cell-bg); border:1px solid var(--border); transition: border-color 0.1s, background 0.1s; }
.day-cell:hover { border-color: var(--muted); background: var(--cell-hover); }
.day-cell.empty{background:none;cursor:default;border:none;}
.day-cell.today { border: 2px solid var(--accent) !important; background: rgba(194, 232, 112, 0.1); }
.day-cell.dimmed{opacity:0.35;}
.day-cell.selected{border:2px solid #fff !important;}

.day-num, .cell-icons { position: relative; z-index: 2; pointer-events: none; }
.day-num{ font-size:13px; font-family:'DM Mono',monospace; font-weight:600; color:var(--text); align-self: flex-start; padding-left: 6px; }
.day-cell.today .day-num{ color:var(--accent); font-weight: 700;}

.cell-icons{ display:flex; gap:4px; justify-content:center; min-height:18px; flex-wrap:wrap; }
.cell-icon i { font-size: 16px; }

.moon-bg {

  width: 80px; height: 80px; border-radius: 50%; 
  background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
  background-size: cover; background-position: center;
  opacity: 0.35; z-index: 1; pointer-events: none;
}

.detail-inner{padding:20px;}
.det-row{display:flex;align-items:center;gap:20px;}

.det-moon-css {

.det-info{flex:1;}

.det-type{font-family:'Lora',serif;font-size:26px;font-weight:600; line-height:1.1;}
.det-savia{font-size:14px; color:var(--muted); margin-top:6px; font-style:italic;}
.det-meta{font-size:13px;color:var(--text);margin-top:8px; display: flex; gap: 8px; align-items: center; font-family:'DM Mono',monospace; font-weight:500;}
.det-meta i { font-size: 16px; color:var(--accent); }

.det-divider{height:1px;background:var(--border);margin:20px 0;}
.det-acts-label{ font-size:12px; font-weight:600; text-transform:uppercase; color:var(--muted); font-family:'DM Mono',monospace; margin:16px 0 12px; letter-spacing: 0.05em;}
.det-acts{display:flex;flex-wrap:wrap;gap:10px;}

.tooltip{ position:fixed; bottom:0;left:0;right:0; background:var(--bg-dark); border-top:1px solid var(--border); border-radius:24px 24px 0 0; padding:24px 24px 40px; z-index:200; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); max-width:480px; margin:0 auto; box-shadow: 0 -20px 40px rgba(0,0,0,0.9); }

function getLunarData(year, month, day) {
  const utcDate = new Date(Date.UTC(year, month, day) - gmtOffset * 3600000);
  const jd = (utcDate.getTime() / 86400000) + 2440587.5;
  const T_cen = (jd - 2451545.0) / 36525;
  const L1 = 218.3164477 + 481267.88123421 * T_cen;
  const D = 297.8501921 + 445267.1114034 * T_cen;
  const M = 357.5291092 + 35999.0502909 * T_cen;
  const M1 = 134.9633964 + 477198.8675055 * T_cen;
  const dRad = (D % 360) * Math.PI / 180;
  const mRad = (M % 360) * Math.PI / 180;
  const m1Rad = (M1 % 360) * Math.PI / 180;
  let moonLong = L1 + 6.288774 * Math.sin(m1Rad) + 1.274027 * Math.sin(2 * dRad - m1Rad) + 0.658314 * Math.sin(2 * dRad) - 0.213618 * Math.sin(mRad);
  moonLong = ((moonLong % 360) + 360) % 360;
  const signIdx = Math.floor(moonLong / 30);
  const dayType = SIGN_TYPE[signIdx];
  const synodicAge = ((D % 360) + 360) % 360;
  let phaseIdx;
  if (synodicAge < 22.5 || synodicAge >= 337.5) phaseIdx = 0;
  else if (synodicAge >= 22.5 && synodicAge < 67.5) phaseIdx = 1;
  else if (synodicAge >= 67.5 && synodicAge < 112.5) phaseIdx = 2;
  else if (synodicAge >= 112.5 && synodicAge < 157.5) phaseIdx = 3;
  else if (synodicAge >= 157.5 && synodicAge < 202.5) phaseIdx = 4;
  else if (synodicAge >= 202.5 && synodicAge < 247.5) phaseIdx = 5;
  else if (synodicAge >= 247.5 && synodicAge < 292.5) phaseIdx = 6;
  else phaseIdx = 7;

  let synGroup = '';
  if(phaseIdx === 0) synGroup = 'nueva';
  else if(phaseIdx >= 1 && phaseIdx <= 3) synGroup = 'creciente';
  else if(phaseIdx === 4) synGroup = 'llena';
  else synGroup = 'menguante';

  return { phaseIdx, signIdx, dayType, synGroup };
}

let userLatitude = 6.2952;
let userLongitude = -75.0244; 

async function initializeGlobalLocation() {
  const locEl = document.getElementById('weatherLoc');
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        userLatitude = pos.coords.latitude; userLongitude = pos.coords.longitude;
        gmtOffset = -new Date().getTimezoneOffset() / 60;
        locEl.innerHTML = `<i class="ph-fill ph-map-pin" style="font-size:14px; color:var(--accent);"></i> Satélite Conectado`;
        loadWeatherData(userLatitude, userLongitude);
      },
      () => {
        locEl.innerHTML = `<i class="ph-fill ph-map-pin" style="font-size:14px; color:var(--accent);"></i> San Rafael (Antioquia)`;
        loadWeatherData(userLatitude, userLongitude);
      }
    );
  } else { loadWeatherData(userLatitude, userLongitude); }
}

async function loadWeatherData(lat, lon) {
  const loadingEl = document.getElementById('weatherLoading');
  const daysEl = document.getElementById('weatherDays');
  try {
    const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,precipitation_probability_max&timezone=auto`);
    const data = await response.json();
    if(!data || !data.daily) throw new Error();
    loadingEl.style.display = 'none'; daysEl.style.display = 'flex'; daysEl.innerHTML = '';
    const weekdayNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    for(let i = 0; i < 3; i++) {
      const dateObj = new Date(data.daily.time[i] + 'T00:00');
      const dayName = weekdayNames[dateObj.getDay()];
      const maxTemp = Math.round(data.daily.temperature_2m_max[i]);
      const rainProb = data.daily.precipitation_probability_max[i];
      const code = data.daily.weathercode[i];
      let icon = 'ph-sun';
      if(code >= 1 && code <= 3) icon = 'ph-cloud';
      else if(code >= 45 && code <= 48) icon = 'ph-cloud-fog';
      else if(code >= 51 && code <= 67) icon = 'ph-cloud-drizzle';
      else if(code >= 80 && code <= 82) icon = 'ph-cloud-rain';
      else if(code >= 95) icon = 'ph-cloud-lightning';
      daysEl.innerHTML += `
        <div class="wf-day">
          <div class="wf-date">${i === 0 ? 'Hoy' : dayName}</div>
          <div class="wf-icon"><i class="ph-duotone ${icon}"></i></div>
          <div class="wf-temp">${maxTemp}°</div>
          <div class="wf-rain"><i class="ph-duotone ph-drop" style="font-size:14px;"></i> ${rainProb}%</div>
        </div>
      `;
    }
  } catch(e) { loadingEl.textContent = 'Clima temporalmente no disponible'; }
}

function buildActFilter() {
  const groups = {1:[], 2:[], 3:[], 4:[]};
  ALL_ACTS.forEach(a => groups[a.cat].push(a));
  const catNames = {1:'🌱 Tareas Agrícolas', 2:'🪵 Periferia y Proceso', 3:'✂️ Cuidado Personal', 4:'🏕️ Comunitario'};

  let html = '';
  for(let c=1; c<=4; c++) {
    if(groups[c].length === 0) continue;
    html += `<div style="font-size:13px; font-weight:600; color:var(--accent); font-family:'DM Mono',monospace; margin:24px 0 12px; text-transform:uppercase; letter-spacing:0.05em;">${catNames[c]}</div>`;
    html += `<div style="display:flex; flex-wrap:wrap; gap:10px;">`;
    groups[c].forEach(a => {
      html += `<button class="act-chip${checkedActs.has(a.key)?' checked':''}" onclick="toggleAct('${a.key}')"><i class="ph-duotone ${a.icon} icon-cat-${a.cat}"></i> ${a.es}</button>`;
    });
    html += `</div>`;
  }
  document.getElementById('filterCategories').innerHTML = html;
}

function toggleAct(key) { 
  if(checkedActs.has(key)) checkedActs.delete(key); else checkedActs.add(key); 
  render(); 
  buildActFilter(); 
}
function clearActFilter() { checkedActs.clear(); render(); }
function openFilter(e) { if(e) e.stopPropagation(); buildActFilter(); document.getElementById('filterTooltip').classList.add('visible'); }
function closeFilter(e) { if(e)e.stopPropagation(); document.getElementById('filterTooltip').classList.remove('visible'); }

function getDayActs(synGroup, dayType) {
  return ALL_ACTS.filter(a => (a.type === 'syn' && a.group === synGroup) || (a.type === 'thun' && a.group === dayType));
}

function render() {
  const t = T[lang];
  
  const safeMonth = Math.max(0, Math.min(11, viewMonth));
  document.body.style.backgroundImage = MONTH_BGS[safeMonth];
  document.body.style.backgroundSize = 'cover';
  document.body.style.backgroundPosition = 'center';
  document.body.style.backgroundAttachment = 'fixed';

  document.getElementById('monthName').textContent = t.months[viewMonth];
  document.getElementById('yearLabel').textContent = viewYear;
  document.getElementById('weekdays').innerHTML = t.wd.map(d=>`<div class="wd">${d}</div>`).join('');

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const dim = new Date(viewYear, viewMonth + 1, 0).getDate();
  const now = new Date();
  let html = '';
  for(let i = 0; i < offset; i++) html += '<div class="day-cell empty"></div>';

  for(let d = 1; d <= dim; d++) {
    const {phaseIdx, dayType, synGroup} = getLunarData(viewYear, viewMonth, d);
    const isToday = d===now.getDate() && viewMonth===now.getMonth() && viewYear===now.getFullYear();
    const isSel = selectedDate && selectedDate.d===d && selectedDate.m===viewMonth && selectedDate.y===viewYear;
    
    const dayActs = getDayActs(synGroup, dayType);
    const matches = checkedActs.size === 0 || dayActs.some(a => checkedActs.has(a.key));
    
    const sortedActs = [...dayActs].sort((a,b) => (a.type==='syn' ? -1 : 1));
    const iconsHtml = sortedActs.slice(0, 4).map(a => `<span class="cell-icon"><i class="ph-duotone ${a.icon} icon-cat-${a.cat}"></i></span>`).join('');

    html += `<div class="day-cell${isToday?' today':''}${isSel?' selected':''}${!matches?' dimmed':''}"
      onclick="handleDayTap(${d},event)">
      <div class="moon-bg"></div>
      <span class="day-num">${d}</span>
      <div class="cell-icons">${iconsHtml}</div>
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;

  const sh = 'rgba(11, 18, 10, 0.95)';
  const shF = 'rgba(11, 18, 10, 0.5)';

  const cells = document.querySelectorAll('#calGrid .day-cell:not(.empty)');
  cells.forEach((cell, index) => {
    const {phaseIdx} = getLunarData(viewYear, viewMonth, index + 1);
    const mCss = cell.querySelector('.moon-bg');
    mCss.innerHTML = '';
    
    if (phaseIdx === 0) {
      const inner = document.createElement('div');
      inner.style.cssText = `position:absolute;inset:0;border-radius:50%;background:${sh};`;
      mCss.appendChild(inner);
    } else if (phaseIdx !== 4) {
      const gradMap = {
        1: `radial-gradient(ellipse 85% 100% at 15% 50%, ${sh} 50%, ${shF} 70%, transparent 95%)`,
        2: `linear-gradient(90deg, ${sh} 45%, ${shF} 50%, transparent 55%)`,
        3: `radial-gradient(ellipse 60% 100% at 0% 50%, ${sh} 30%, ${shF} 50%, transparent 75%)`,
        5: `radial-gradient(ellipse 60% 100% at 100% 50%, ${sh} 30%, ${shF} 50%, transparent 75%)`,
        6: `linear-gradient(270deg, ${sh} 45%, ${shF} 50%, transparent 55%)`,
        7: `radial-gradient(ellipse 85% 100% at 85% 50%, ${sh} 50%, ${shF} 70%, transparent 95%)`
      };
      const inner = document.createElement('div');
      inner.style.cssText = `position:absolute;inset:0;border-radius:50%;background:${gradMap[phaseIdx]};`;
      mCss.appendChild(inner);
    }
  });

  const activeDay = selectedDate || {y:now.getFullYear(), m:now.getMonth(), d:now.getDate()};
  renderDetail(activeDay.y, activeDay.m, activeDay.d);
}

function renderDetail(y, m, d) {
  const t = T[lang];
  const {phaseIdx, signIdx, dayType, synGroup} = getLunarData(y, m, d);
  const dateStr = `${t.wdFull[new Date(y, m, d).getDay()]} , ${d} ${t.months[m]} ${y}`;

  const sh = 'rgba(11, 18, 10, 0.95)';
  const shF = 'rgba(11, 18, 10, 0.5)';

  const phaseStyles = {
    1: `radial-gradient(ellipse 85% 100% at 15% 50%, ${sh} 50%, ${shF} 70%, transparent 95%)`,
    2: `linear-gradient(90deg, ${sh} 45%, ${shF} 50%, transparent 55%)`,
    3: `radial-gradient(ellipse 60% 100% at 0% 50%, ${sh} 30%, ${shF} 50%, transparent 75%)`,
    5: `radial-gradient(ellipse 60% 100% at 100% 50%, ${sh} 30%, ${shF} 50%, transparent 75%)`,
    6: `linear-gradient(270deg, ${sh} 45%, ${shF} 50%, transparent 55%)`,
    7: `radial-gradient(ellipse 85% 100% at 85% 50%, ${sh} 50%, ${shF} 70%, transparent 95%)`
  };

  let innerShadow = '';
  if (phaseIdx === 0) {
    innerShadow = `<div style="position:absolute;inset:0;border-radius:50%;background:${sh};"></div>`;
  } else if (phaseIdx !== 4 && phaseStyles[phaseIdx]) {
    innerShadow = `<div style="position:absolute;inset:0;border-radius:50%;background:${phaseStyles[phaseIdx]};"></div>`;
  }

  const dayActs = getDayActs(synGroup, dayType);
  const synActs = dayActs.filter(a => a.type === 'syn');
  const thunActs = dayActs.filter(a => a.type === 'thun');

  const synHtml = synActs.map(a=>`<div class="det-act"><i class="ph-duotone ${a.icon} icon-cat-${a.cat}"></i> ${a.es}</div>`).join('');
  const thunHtml = thunActs.map(a=>`<div class="det-act"><i class="ph-duotone ${a.icon} icon-cat-${a.cat}"></i> ${a.es}</div>`).join('');

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-inner">
      <div class="det-row">
        <div class="det-moon-css">${innerShadow}</div>
        <div class="det-info">
          <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div class="det-date">${dateStr}</div>
            <button onclick="shareDay('${dateStr}', '${t.phases[phaseIdx]}', '${t.savia[synGroup]}', '${t.types[dayType]}', '${t.signs[signIdx]}')" 
                    style="background: var(--bg-dark); border: 1px solid var(--border); color: var(--accent); padding: 8px 14px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight:600; transition: all 0.2s;">
              <i class="ph-duotone ph-share-network" style="font-size:16px;"></i> COMPARTIR
            </button>
          </div>
          <div class="det-type">${t.phases[phaseIdx]}</div>
          <div class="det-savia">${t.savia[synGroup]}</div>
          <div class="det-meta"><i class="ph-duotone ph-sparkles"></i> Tránsito en ${t.signs[signIdx]} (Día de ${t.types[dayType]})</div>
        </div>
      </div>
      <div class="det-divider"></div>
      
      <div class="det-acts-label">🌿 Guía Ancestral</div>
      <div class="det-acts">${synHtml}</div>
      
      ${thunActs.length > 0 ? `
      <div class="det-acts-label" style="margin-top:20px;">✨ Aporte Biodinámico</div>
      <div class="det-acts">${thunHtml}</div>
      ` : ''}
    </div>`;
}

function shareDay(dateStr, phaseName, saviaText, typeName, signName) {
  const textToShare = `🌿 Foco del día: ${dateStr}\n🌕 Fase: ${phaseName} (${saviaText})\n✨ Tránsito: Día de ${typeName} en ${signName}.\n\nRevisa la app para ver las tareas recomendadas.`;
  if (navigator.share) {
    navigator.share({ title: 'Calendario Lunar Permacultor', text: textToShare }).catch(console.error);
  } else {
    navigator.clipboard.writeText(textToShare);
    alert('¡Resumen del día copiado al portapapeles!');
  }
}

function handleDayTap(d, e) {
  e.stopPropagation();
  selectedDate = {y:viewYear, m:viewMonth, d};
  render();
  const t = T[lang];
  const {phaseIdx, signIdx, dayType, synGroup} = getLunarData(viewYear, viewMonth, d);
  
  const dayActs = getDayActs(synGroup, dayType);
  const synActs = dayActs.filter(a => a.type === 'syn');
  const thunActs = dayActs.filter(a => a.type === 'thun');

  document.getElementById('ttDate').textContent = `${d} ${t.months[viewMonth]}`;
  document.getElementById('ttType').innerHTML = `<i class="ph-duotone ph-moon" style="color:var(--accent);"></i> ${t.phases[phaseIdx]}`;
  document.getElementById('ttSavia').textContent = t.savia[synGroup];
  
  document.getElementById('ttActsAncestral').innerHTML = `
    <div class="det-acts-label">🌿 Guía Ancestral</div>
    <div class="det-acts">${synActs.map(a=>`<div class="det-act"><i class="ph-duotone ${a.icon} icon-cat-${a.cat}"></i> ${a.es}</div>`).join('')}</div>
  `;
  
  document.getElementById('ttActsThun').innerHTML = thunActs.length > 0 ? `
    <div class="det-acts-label" style="margin-top:20px;">✨ Biodinámica (Día de ${t.types[dayType]})</div>
    <div class="det-acts">${thunActs.map(a=>`<div class="det-act"><i class="ph-duotone ${a.icon} icon-cat-${a.cat}"></i> ${a.es}</div>`).join('')}</div>
  ` : '';

  document.getElementById('tooltip').classList.add('visible');
}

function dismissTooltip(e) { if(e)e.stopPropagation(); document.getElementById('tooltip').classList.remove('visible'); }
document.addEventListener('click', () => { dismissTooltip(); closeFilter(); });
document.getElementById('tooltip').addEventListener('click', e => e.stopPropagation());
document.getElementById('filterTooltip').addEventListener('click', e => e.stopPropagation());

let touchStartX = 0;
const calBox = document.getElementById('calContainer');
calBox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
calBox.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 80) { dx < 0 ? nextMonth() : prevMonth(); }
}, {passive:true});

function prevMonth() { viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} selectedDate=null; render(); }
function nextMonth() { viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} selectedDate=null; render(); }
function goToday() { const n = new Date(); viewYear=n.getFullYear(); viewMonth=n.getMonth(); selectedDate=null; render(); }

document.getElementById('prevBtn').onclick = prevMonth;
document.getElementById('nextBtn').onclick = nextMonth;
document.getElementById('todayBtn').onclick = goToday;

(function init() {
  const now = new Date(); viewYear = now.getFullYear(); viewMonth = now.getMonth();
  initializeGlobalLocation(); render();
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Modo offline activado'))
      .catch(err => console.error('Error al activar modo offline', err));
  });
}
</script>
</body>
</html>
