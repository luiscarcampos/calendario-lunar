<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#c2e870">
<link rel="manifest" href="./manifest.json">
<title>Calendario Lunar y Clima Agrícola</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Lora:ital,wght=0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --accent: #c2e870; 
  --text: #f8f9f4;
  --text-dark: #141f11;
  --muted: rgba(255, 255, 255, 0.65);
  --border: rgba(255, 255, 255, 0.15);
  --radius: 16px;
  --glass-bg: rgba(15, 25, 15, 0.35);
  --glass-cell: rgba(0, 0, 0, 0.25);
  --blur: blur(12px);
  
  --cat-1: #95d943;
  --cat-2: #e09f4e;
  --cat-3: #4faed1;
  --cat-4: #d94389;
}

*{box-sizing:border-box;margin:0;padding:0;}
body {
  font-family: 'Inter', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background-image 0.5s ease-in-out;
}
.bg-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(to bottom, rgba(10,20,10,0.3) 0%, rgba(10,20,10,0.7) 100%);
  z-index: -1;
}

.glass-panel {
  background: var(--glass-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.header { display: flex; justify-content: space-between; align-items: flex-end; padding: 24px 16px 16px; }
.month-name{ font-family:'Lora',serif; font-size:36px; font-weight:500; line-height: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
.year-label{ font-family:'DM Mono',monospace; font-size:14px; color:var(--accent); margin-left: 8px;}

.nav-group{display:flex;align-items:center;gap:6px;}
.nav-btn{ background: rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; padding:8px; cursor:pointer; color:var(--text); transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.nav-btn:hover{background:rgba(255,255,255,0.15); border-color: var(--accent);}
.today-btn{ font-size:11px; font-family:'DM Mono',monospace; color:var(--accent); border-color:rgba(192,232,112,0.3); padding: 8px 12px;}

.weather-widget { margin: 0 14px 16px; padding: 14px; position: relative; z-index: 10; }
.weather-header { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
.weather-loading { font-size: 12px; color: var(--muted); text-align: center; }
.weather-days { display: flex; justify-content: space-between; gap: 8px; }
.wf-day { flex: 1; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.02); padding: 8px 4px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); }
.wf-date { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
.wf-icon { margin-bottom: 4px; font-size: 18px; color: var(--accent); }
.wf-temp { font-size: 13px; font-weight: 500; margin-bottom: 2px;}
.wf-rain { font-size: 10px; color: #a4d8ef; display: flex; align-items: center; gap: 3px; }

.act-filter-wrap{ padding:0 16px 16px; }
.act-chip{ display:flex;align-items:center;gap:6px; font-size:12px; font-weight: 500; padding:8px 14px; border-radius:12px; border:1px solid var(--border); background: var(--glass-cell); backdrop-filter: blur(4px); cursor:pointer; color:var(--text); white-space:nowrap; transition:all 0.2s; }
.act-chip.checked{ background: rgba(255,255,255,0.15); border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
.act-chip i { font-size: 18px; }

.icon-cat-1 { color: var(--cat-1); }
.icon-cat-2 { color: var(--cat-2); }
.icon-cat-3 { color: var(--cat-3); }
.icon-cat-4 { color: var(--cat-4); }

.weekdays{ display:grid; grid-template-columns:repeat(7,1fr); padding:0 12px 8px; }
.wd{ text-align:center; font-size:11px; color:var(--accent); font-family:'DM Mono',monospace; font-weight:500; opacity: 0.8;}

.cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); padding:0 12px 12px; gap:4px; }
.day-cell{ position: relative; overflow: hidden; border-radius: 12px; min-height:80px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content: space-between; padding: 6px 4px; background: var(--glass-cell); border:1px solid rgba(255,255,255,0.08); transition: transform 0.1s, border-color 0.15s, background 0.2s; backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); }
.day-cell:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); }
.day-cell.empty{background:none;cursor:default;border:none;backdrop-filter:none;}
.day-cell.today { border: 1.5px solid var(--accent) !important; background: rgba(194, 232, 112, 0.15); }
.day-cell.dimmed{opacity:0.25; transform: scale(0.96);}
.day-cell.selected{border:1.5px solid #fff !important; box-shadow: 0 0 20px rgba(255,255,255,0.2);}

.day-num, .cell-icons { position: relative; z-index: 2; pointer-events: none; }
.day-num{ font-size:11px; font-family:'DM Mono',monospace; font-weight:500; color:var(--text); align-self: flex-start; padding-left: 4px; opacity: 0.9;}
.day-cell.today .day-num{ color:var(--accent); font-weight: 600;}

.cell-icons{ display:flex; gap:4px; justify-content:center; min-height:16px; }
.cell-icon i { font-size: 14px; }

/* La foto de la luna base con opacidad */
.moon-bg { 
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
  width: 80px; height: 80px; border-radius: 50%; 
  background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
  background-size: cover; background-position: center;
  opacity: 0.35; z-index: 1; pointer-events: none;
}

.detail{ margin:4px 12px 20px; }
.detail-inner{padding:20px;}
.det-row{display:flex;align-items:center;gap:20px;}

.det-moon-css {
  width:64px;height:64px;border-radius:50%;position:relative;overflow:hidden;
  background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg');
  background-size: cover; background-position: center;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.det-info{flex:1;}
.det-date{font-size:12px;color:var(--accent);font-family:'DM Mono',monospace;margin-bottom:4px;}
.det-type{font-family:'Lora',serif;font-size:22px;font-weight:500;}
.det-meta{font-size:13px;color:var(--muted);margin-top:6px; display: flex; gap: 8px; align-items: center;}
.det-meta i { font-size: 16px; }
.det-divider{height:1px;background:var(--border);margin:16px 0;}
.det-acts-label{ font-size:11px; text-transform:uppercase; color:var(--accent); font-family:'DM Mono',monospace; margin-bottom:12px; letter-spacing: 0.05em;}
.det-acts{display:flex;flex-wrap:wrap;gap:8px;}
.det-act{ display:flex;align-items:center;gap:8px; font-size:12px; font-weight: 500; background:rgba(0,0,0,0.3); border-radius:8px; padding:8px 14px; border:1px solid rgba(255,255,255,0.05); }
.det-act i { font-size: 20px; }

.tooltip{ position:fixed; bottom:0;left:0;right:0; background:rgba(20,30,20,0.85); border-top:1px solid var(--border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius:24px 24px 0 0; padding:20px 24px 34px; z-index:200; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); max-width:480px; margin:0 auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
.tooltip.visible{transform:translateY(0);}
.tooltip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom:12px; }
.tooltip-close { background: none; border: none; color: var(--muted); cursor: pointer; display: flex; font-size: 24px;}
.tooltip-date{ font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); }
.tooltip-type{ font-family:'Lora',serif; font-size:24px; font-weight:500; margin:4px 0; display: flex; align-items: center; gap: 10px;}
.tooltip-phase{ font-size:13px; color:var(--muted); margin-bottom:18px; }

.legend{ display:flex; flex-wrap:wrap; gap:16px 20px; padding:0 16px 30px; justify-content: center; }
.leg{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.leg i { font-size: 16px; }
</style>
</head>
<body>

<div class="bg-overlay"></div>

<div style="max-width:480px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh;">

  <div class="header">
    <div>
      <span class="month-name" id="monthName"></span>
      <span class="year-label" id="yearLabel"></span>
    </div>
    <div class="nav-group">
      <button class="nav-btn" id="prevBtn"><i class="ph ph-caret-left"></i></button>
      <button class="nav-btn today-btn" id="todayBtn">HOY</button>
      <button class="nav-btn" id="nextBtn"><i class="ph ph-caret-right"></i></button>
    </div>
  </div>

  <div class="weather-widget glass-panel" id="weatherWidget">
    <div class="weather-header">
      <span style="display:flex; align-items:center; gap:6px;"><i class="ph-duotone ph-cloud-rain" style="font-size:16px;"></i> <span id="weatherTitle">Pronóstico Agrícola</span></span>
      <span style="color:var(--muted); display:flex; align-items:center; gap:4px;" id="weatherLoc"><i class="ph-fill ph-map-pin" style="font-size:12px;"></i> Buscando...</span>
    </div>
    <div class="weather-loading" id="weatherLoading">Sincronizando satélite...</div>
    <div class="weather-days" id="weatherDays" style="display:none;"></div>
  </div>

  <div class="act-filter-wrap">
    <button onclick="openFilter(event)" style="width:100%; background:rgba(0,0,0,0.2); border:1px solid var(--border); color:var(--text); padding:12px; border-radius:12px; display:flex; justify-content:center; align-items:center; gap:8px; font-family:'DM Mono',monospace; font-size:12px; cursor:pointer; transition:background 0.2s;">
      <i class="ph-duotone ph-faders" style="font-size:18px;"></i> FILTRAR TAREAS
    </button>
  </div>

    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="detail glass-panel" id="detailPanel"></div>
  <div class="legend" id="legend"></div>

</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-header">
    <div class="tooltip-date" id="ttDate"></div>
    <button class="tooltip-close" onclick="dismissTooltip(event)"><i class="ph ph-x"></i></button>
  </div>
  <div class="tooltip-type" id="ttType"></div>
  <div class="tooltip-phase" id="ttPhase"></div>
  <div class="tooltip-acts det-acts" id="ttActs"></div>
</div>

<div class="tooltip" id="filterTooltip">
  <div class="tooltip-header">
    <div class="tooltip-type" style="font-size: 20px;">Filtros de Tareas</div>
    <button class="tooltip-close" onclick="closeFilter(event)"><i class="ph ph-x"></i></button>
  </div>
  <div id="filterCategories" style="max-height: 50vh; overflow-y: auto; padding-bottom: 20px;"></div>
  <button onclick="clearActFilter(); closeFilter()" style="width:100%; background:none; border:1px solid var(--accent); color:var(--accent); padding:12px; border-radius:12px; font-family:'DM Mono',monospace; cursor:pointer; font-weight: 500; transition:all 0.2s;">MOSTRAR TODAS</button>
</div>

<script>

  'url(https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1080&auto=format&fit=crop)',

const SIGN_TYPE = {0:'fruit',1:'root',2:'flower',3:'leaf',4:'fruit',5:'root',6:'flower',7:'leaf',8:'fruit',9:'root',10:'flower',11:'leaf'};

const ACTS_DEF = {
  root:[
    {key:'seed',    icon:'ph-plant', es:'Siembra Raíces', cat: 1},
    {key:'transplant',icon:'ph-potted-plant',es:'Trasplantes', cat: 1},

    {key:'hairgrow',icon:'ph-scissors', es:'Corte Cabello (Crece)', cat: 3},
  ],
  fruit:[
    {key:'fruitharvest',icon:'ph-orange-slice',es:'Cosecha Frutos', cat: 1},
    {key:'timber',  icon:'ph-axe', es:'Cortar madera', cat: 2},

let lang = 'es';
let gmtOffset = -5;
let viewYear, viewMonth;
let selectedDate = null;
let checkedActs = new Set();

const T = {
  es:{
    months:['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'],
    wdFull:['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'],
    wd:['L','M','X','J','V','S','D'],
    types:{root:'Día de Raíz',flower:'Día de Flor',leaf:'Día de Hoja',fruit:'Día de Fruto'},
    typeShort:{root:'Raíz',flower:'Flor',leaf:'Hoja',fruit:'Fruto'},
    phases:['Luna Nueva','Creciente','Cuarto Creciente','Gibosa Creciente','Luna Llena','Gibosa Menguante','Cuarto Menguante','Menguante'],
    signs:['Aries','Tauro','Géminis','Cáncer','Leo','Virgo','Libra','Escorpio','Sagitario','Capricornio','Acuario','Piscis'],
    actsLabel:'Actividades Recomendadas',
    weatherTitle: 'Pronóstico Agrícola'
  }
};

function getLunarData(year, month, day) {
  const utcDate = new Date(Date.UTC(year, month, day) - gmtOffset * 3600000);
  const jd = (utcDate.getTime() / 86400000) + 2440587.5;
  const T_cen = (jd - 2451545.0) / 36525;
  const L1 = 218.3164477 + 481267.88123421 * T_cen;
  const D = 297.8501921 + 445267.1114034 * T_cen;
  const M = 357.5291092 + 35999.0502909 * T_cen;
  const M1 = 134.9633964 + 477198.8675055 * T_cen;
  const dRad = (D % 360) * Math.PI / 180;
  const mRad = (M % 360) * Math.PI / 180;
  const m1Rad = (M1 % 360) * Math.PI / 180;
  let moonLong = L1 + 6.288774 * Math.sin(m1Rad) + 1.274027 * Math.sin(2 * dRad - m1Rad) + 0.658314 * Math.sin(2 * dRad) - 0.213618 * Math.sin(mRad);
  moonLong = ((moonLong % 360) + 360) % 360;
  const signIdx = Math.floor(moonLong / 30);
  const dayType = SIGN_TYPE[signIdx];
  const synodicAge = ((D % 360) + 360) % 360;
  let phaseIdx;
  if (synodicAge < 22.5 || synodicAge >= 337.5) phaseIdx = 0;
  else if (synodicAge >= 22.5 && synodicAge < 67.5) phaseIdx = 1;
  else if (synodicAge >= 67.5 && synodicAge < 112.5) phaseIdx = 2;
  else if (synodicAge >= 112.5 && synodicAge < 157.5) phaseIdx = 3;
  else if (synodicAge >= 157.5 && synodicAge < 202.5) phaseIdx = 4;
  else if (synodicAge >= 202.5 && synodicAge < 247.5) phaseIdx = 5;
  else if (synodicAge >= 247.5 && synodicAge < 292.5) phaseIdx = 6;
  else phaseIdx = 7;
  return { phaseIdx, signIdx, dayType, illum: (1 - Math.cos(synodicAge * Math.PI / 180)) / 2 };
}

let userLatitude = 6.2952;
let userLongitude = -75.0244; 

async function initializeGlobalLocation() {
  const locEl = document.getElementById('weatherLoc');
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        userLatitude = pos.coords.latitude; userLongitude = pos.coords.longitude;
        gmtOffset = -new Date().getTimezoneOffset() / 60;
        locEl.innerHTML = `<i class="ph-fill ph-map-pin" style="font-size:12px;"></i> Satélite Conectado`;
        loadWeatherData(userLatitude, userLongitude);
      },
      () => {
        locEl.innerHTML = `<i class="ph-fill ph-map-pin" style="font-size:12px;"></i> San Rafael (Antioquia)`;
        loadWeatherData(userLatitude, userLongitude);
      }
    );
  } else { loadWeatherData(userLatitude, userLongitude); }
}

async function loadWeatherData(lat, lon) {
  const loadingEl = document.getElementById('weatherLoading');
  const daysEl = document.getElementById('weatherDays');
  try {
    const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,precipitation_probability_max&timezone=auto`);
    const data = await response.json();
    if(!data || !data.daily) throw new Error();
    loadingEl.style.display = 'none'; daysEl.style.display = 'flex'; daysEl.innerHTML = '';
    const weekdayNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    for(let i = 0; i < 3; i++) {
      const dateObj = new Date(data.daily.time[i] + 'T00:00');
      const dayName = weekdayNames[dateObj.getDay()];
      const maxTemp = Math.round(data.daily.temperature_2m_max[i]);
      const rainProb = data.daily.precipitation_probability_max[i];
      const code = data.daily.weathercode[i];
      let icon = 'ph-sun';
      if(code >= 1 && code <= 3) icon = 'ph-cloud';
      else if(code >= 45 && code <= 48) icon = 'ph-cloud-fog';
      else if(code >= 51 && code <= 67) icon = 'ph-cloud-drizzle';
      else if(code >= 80 && code <= 82) icon = 'ph-cloud-rain';
      else if(code >= 95) icon = 'ph-cloud-lightning';
      daysEl.innerHTML += `
        <div class="wf-day">
          <div class="wf-date">${i === 0 ? 'Hoy' : dayName}</div>
          <div class="wf-icon"><i class="ph-duotone ${icon}"></i></div>
          <div class="wf-temp">${maxTemp}°</div>
          <div class="wf-rain"><i class="ph-duotone ph-drop" style="font-size:12px;"></i> ${rainProb}%</div>
        </div>
      `;
    }
  } catch(e) { loadingEl.textContent = 'Clima temporalmente no disponible'; }
}

function buildActFilter() {
  const allActs = Object.values(ACTS_DEF).flat();
  const uniqueActs = [];
  const map = new Map();
  for(const a of allActs) { if(!map.has(a.key)){ map.set(a.key, true); uniqueActs.push(a); } }

  const groups = {1:[], 2:[], 3:[], 4:[]};
  uniqueActs.forEach(a => groups[a.cat].push(a));
  const catNames = {1:'🌱 Tareas Agrícolas', 2:'🪵 Periferia y Proceso', 3:'✂️ Cuidado Personal', 4:'🏕️ Comunitario'};

  let html = '';
  for(let c=1; c<=4; c++) {
    if(groups[c].length === 0) continue;
    html += `<div style="font-size:12px; color:var(--accent); font-family:'DM Mono',monospace; margin:20px 0 10px; text-transform:uppercase; letter-spacing:0.05em;">${catNames[c]}</div>`;
    html += `<div style="display:flex; flex-wrap:wrap; gap:8px;">`;
    groups[c].forEach(a => {
      html += `<button class="act-chip${checkedActs.has(a.key)?' checked':''}" onclick="toggleAct('${a.key}')"><i class="ph-duotone ${a.icon} icon-cat-${a.cat}"></i> ${a[lang]}</button>`;
    });
    html += `</div>`;
  }
  document.getElementById('filterCategories').innerHTML = html;
}

function toggleAct(key) { 
  if(checkedActs.has(key)) checkedActs.delete(key); else checkedActs.add(key); 
  render(); 
  buildActFilter(); 
}
function clearActFilter() { checkedActs.clear(); render(); }
function openFilter(e) { if(e) e.stopPropagation(); buildActFilter(); document.getElementById('filterTooltip').classList.add('visible'); }
function closeFilter(e) { if(e)e.stopPropagation(); document.getElementById('filterTooltip').classList.remove('visible'); }

function render() {
  const t = T[lang];
  
  const safeMonth = Math.max(0, Math.min(11, viewMonth));
  document.body.style.backgroundImage = MONTH_BGS[safeMonth];
  document.body.style.backgroundSize = 'cover';
  document.body.style.backgroundPosition = 'center';
  document.body.style.backgroundAttachment = 'fixed';

  document.getElementById('monthName').textContent = t.months[viewMonth];
  document.getElementById('yearLabel').textContent = viewYear;
  document.getElementById('weekdays').innerHTML = t.wd.map(d=>`<div class="wd">${d}</div>`).join('');

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const dim = new Date(viewYear, viewMonth + 1, 0).getDate();
  const now = new Date();
  let html = '';
  for(let i = 0; i < offset; i++) html += '<div class="day-cell empty"></div>';

  for(let d = 1; d <= dim; d++) {
    const {phaseIdx, dayType} = getLunarData(viewYear, viewMonth, d);
    const isToday = d===now.getDate() && viewMonth===now.getMonth() && viewYear===now.getFullYear();
    const isSel = selectedDate && selectedDate.d===d && selectedDate.m===viewMonth && selectedDate.y===viewYear;
    
    const matches = checkedActs.size === 0 || ACTS_DEF[dayType].some(a => checkedActs.has(a.key));
    const iconsHtml = ACTS_DEF[dayType].slice(0, 3).map(a => `<span class="cell-icon"><i class="ph-duotone ${a.icon} icon-cat-${a.cat}"></i></span>`).join('');

    html += `<div class="day-cell type-${dayType}${isToday?' today':''}${isSel?' selected':''}${!matches?' dimmed':''}"
      onclick="handleDayTap(${d},event)">
      <div class="moon-bg"></div>
      <span class="day-num">${d}</span>
      <div class="cell-icons">${iconsHtml}</div>
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;

  const sh = 'rgba(20, 31, 17, 0.95)';
  const shF = 'rgba(20, 31, 17, 0.5)';

  const cells = document.querySelectorAll('#calGrid .day-cell:not(.empty)');
  cells.forEach((cell, index) => {
    const {phaseIdx} = getLunarData(viewYear, viewMonth, index + 1);
    const mCss = cell.querySelector('.moon-bg');
    mCss.innerHTML = '';
    
    if (phaseIdx === 0) {
      const inner = document.createElement('div');
      inner.style.cssText = `position:absolute;inset:0;border-radius:50%;background:${sh};`;
      mCss.appendChild(inner);
    } else if (phaseIdx !== 4) {
      const gradMap = {
        1: `radial-gradient(ellipse 85% 100% at 15% 50%, ${sh} 50%, ${shF} 70%, transparent 95%)`,
        2: `linear-gradient(90deg, ${sh} 45%, ${shF} 50%, transparent 55%)`,
        3: `radial-gradient(ellipse 60% 100% at 0% 50%, ${sh} 30%, ${shF} 50%, transparent 75%)`,
        5: `radial-gradient(ellipse 60% 100% at 100% 50%, ${sh} 30%, ${shF} 50%, transparent 75%)`,
        6: `linear-gradient(270deg, ${sh} 45%, ${shF} 50%, transparent 55%)`,
        7: `radial-gradient(ellipse 85% 100% at 85% 50%, ${sh} 50%, ${shF} 70%, transparent 95%)`
      };
      const inner = document.createElement('div');
      inner.style.cssText = `position:absolute;inset:0;border-radius:50%;background:${gradMap[phaseIdx]};`;
      mCss.appendChild(inner);
    }
  });

  const activeDay = selectedDate || {y:now.getFullYear(), m:now.getMonth(), d:now.getDate()};
  renderDetail(activeDay.y, activeDay.m, activeDay.d);
  renderLegend();
}

function renderDetail(y, m, d) {
  const t = T[lang];
  const {phaseIdx, signIdx, dayType, illum} = getLunarData(y, m, d);
  const dateStr = `${t.wdFull[new Date(y, m, d).getDay()]} , ${d} ${t.months[m]} ${y}`;

  const sh = 'rgba(20, 31, 17, 0.95)';
  const shF = 'rgba(20, 31, 17, 0.5)';

  const phaseStyles = {
    1: `radial-gradient(ellipse 85% 100% at 15% 50%, ${sh} 50%, ${shF} 70%, transparent 95%)`,
    2: `linear-gradient(90deg, ${sh} 45%, ${shF} 50%, transparent 55%)`,
    3: `radial-gradient(ellipse 60% 100% at 0% 50%, ${sh} 30%, ${shF} 50%, transparent 75%)`,
    5: `radial-gradient(ellipse 60% 100% at 100% 50%, ${sh} 30%, ${shF} 50%, transparent 75%)`,
    6: `linear-gradient(270deg, ${sh} 45%, ${shF} 50%, transparent 55%)`,
    7: `radial-gradient(ellipse 85% 100% at 85% 50%, ${sh} 50%, ${shF} 70%, transparent 95%)`
  };

  let innerShadow = '';
  if (phaseIdx === 0) {
    innerShadow = `<div style="position:absolute;inset:0;border-radius:50%;background:${sh};"></div>`;
  } else if (phaseIdx !== 4 && phaseStyles[phaseIdx]) {
    innerShadow = `<div style="position:absolute;inset:0;border-radius:50%;background:${phaseStyles[phaseIdx]};"></div>`;
  }

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-inner">
      <div class="det-row">
        <div class="det-moon-css">${innerShadow}</div>
        <div class="det-info">
          <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div class="det-date">${dateStr}</div>
            <button onclick="shareDay('${dateStr}', '${t.types[dayType]}', '${dayType}')" 
                    style="background: none; border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 10px; transition: all 0.2s;">
              <i class="ph-duotone ph-share-network" style="font-size:14px;"></i> COMPARTIR
            </button>
          </div>
          <div class="det-type">${t.types[dayType]}</div>
          <div class="det-meta"><i class="ph-duotone ph-moon"></i> ${t.phases[phaseIdx]} &nbsp; <i class="ph-duotone ph-sparkles"></i> ${t.signs[signIdx]}</div>
        </div>
      </div>
      <div class="det-divider"></div>
      <div class="det-acts-label">${t.actsLabel}</div>
      <div class="det-acts">${ACTS_DEF[dayType].map(a=>`<div class="det-act"><i class="ph-duotone ${a.icon} icon-cat-${a.cat}"></i> ${a[lang]}</div>`).join('')}</div>
    </div>`;
}

function renderLegend() {
  const t = T[lang];
  const indicators = {root:'ph-tree-evergreen', flower:'ph-flower-tulip', leaf:'ph-leaf', fruit:'ph-orange-slice'};
  document.getElementById('legend').innerHTML = Object.entries(indicators).map(([k,icon]) =>
    `<div class="leg"><i class="ph-duotone ${icon}"></i> <span style="color:#fff;font-weight:500;">${t.typeShort[k]}</span></div>`
  ).join('');
}

function shareDay(dateStr, typeName, dayType) {
  const acts = ACTS_DEF[dayType].map(a => a[lang]).join(', ');
  const textToShare = `🌿 Foco del día: ${dateStr}\n✨ Hoy es ${typeName}.\n\nRecomendado para: ${acts}.`;
  if (navigator.share) {
    navigator.share({ title: 'Calendario Lunar Permacultor', text: textToShare }).catch(console.error);
  } else {
    navigator.clipboard.writeText(textToShare);
    alert('¡Resumen del día copiado al portapapeles!');
  }
}

function handleDayTap(d, e) {
  e.stopPropagation();
  selectedDate = {y:viewYear, m:viewMonth, d};
  render();
  const t = T[lang];
  const {phaseIdx, signIdx, dayType} = getLunarData(viewYear, viewMonth, d);
  document.getElementById('ttDate').textContent = `${d} ${t.months[viewMonth]}`;
  document.getElementById('ttType').innerHTML = `<i class="ph-duotone ph-calendar-check"></i> ${t.types[dayType]}`;
  document.getElementById('ttPhase').innerHTML = `${t.phases[phaseIdx]} &nbsp;·&nbsp; ${t.signs[signIdx]}`;
  document.getElementById('ttActs').innerHTML = ACTS_DEF[dayType].map(a => `<div class="det-act"><i class="ph-duotone ${a.icon} icon-cat-${a.cat}"></i> ${a[lang]}</div>`).join('');
  document.getElementById('tooltip').classList.add('visible');
}

function dismissTooltip(e) { if(e)e.stopPropagation(); document.getElementById('tooltip').classList.remove('visible'); }
document.addEventListener('click', () => { dismissTooltip(); closeFilter(); });
document.getElementById('tooltip').addEventListener('click', e => e.stopPropagation());
document.getElementById('filterTooltip').addEventListener('click', e => e.stopPropagation());

let touchStartX = 0;
const calBox = document.getElementById('calContainer');
calBox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
calBox.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 80) { dx < 0 ? nextMonth() : prevMonth(); }
}, {passive:true});

function prevMonth() { viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} selectedDate=null; render(); }
function nextMonth() { viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} selectedDate=null; render(); }
function goToday() { const n = new Date(); viewYear=n.getFullYear(); viewMonth=n.getMonth(); selectedDate=null; render(); }

document.getElementById('prevBtn').onclick = prevMonth;
document.getElementById('nextBtn').onclick = nextMonth;
document.getElementById('todayBtn').onclick = goToday;

(function init() {
  const now = new Date(); viewYear = now.getFullYear(); viewMonth = now.getMonth();
  initializeGlobalLocation(); render();
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Modo offline activado'))
      .catch(err => console.error('Error al activar modo offline', err));
  });
}
</script>
</body>
